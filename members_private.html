<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="format-detection" content="telephone=no">
<meta name="robots" content="noindex,nofollow,noarchive">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>EMBA 원우회 내부 명단</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
:root{
  --ink:#172033;--navy:#203864;--navy2:#162748;--gold:#c9a84c;--gold2:#f0bf5a;
  --bg1:#f7f4ee;--bg2:#efe6d8;--panel:rgba(255,255,255,.93);--border:#e3dccd;
  --soft:#edf4ff;--soft2:#f7f8fc;--green:#eaf6ef;--green-ink:#226744;--r:22px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
[hidden]{display:none !important}
body{
  font-family:"Noto Sans KR","Segoe UI","Apple SD Gothic Neo",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at top left,rgba(240,191,90,.24),transparent 26%),
    radial-gradient(circle at top right,rgba(32,56,100,.10),transparent 20%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
}
.shell{max-width:1360px;margin:0 auto;padding:24px 24px 60px}
.hero{
  background:linear-gradient(135deg,rgba(22,39,72,.98),rgba(44,73,124,.95));
  color:#fff;border-radius:28px;padding:26px 28px 22px;box-shadow:0 24px 54px rgba(32,56,100,.22);
}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;opacity:.64;margin-bottom:8px}
.hero h1{font-size:clamp(26px,3vw,40px);font-weight:900;line-height:1.12;margin-bottom:10px}
.hero-tools{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:8px;flex-wrap:wrap}
.hero-stamp{font-size:12px;font-weight:700;opacity:.82}
.hero-refresh{
  border:none;border-radius:999px;padding:9px 14px;background:rgba(255,255,255,.14);color:#fff;cursor:pointer;
  font:inherit;font-size:12px;font-weight:900;letter-spacing:.01em
}
.hero-refresh:hover{background:rgba(255,255,255,.22)}
.content{
  margin-top:18px;background:var(--panel);border:1px solid var(--border);border-radius:28px;
  box-shadow:0 12px 36px rgba(23,32,51,.08);overflow:hidden;
}
.toolbar{padding:18px 18px 12px;border-bottom:1px solid rgba(32,56,100,.08);background:rgba(255,255,255,.86)}
.toolbar-search{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.toolbar-search input{
  flex:1;border:1px solid #d5ddec;border-radius:14px;background:#fbfcff;color:#1d2940;
  padding:11px 14px;font:inherit;font-size:13px;font-weight:700
}
.toolbar-search input::placeholder{color:#7a879d;font-weight:600}
.toolbar-search button{
  border:none;border-radius:12px;padding:10px 12px;background:#edf1f8;color:#44516d;cursor:pointer;
  font:inherit;font-size:12px;font-weight:900;white-space:nowrap
}
.toolbar-search button:hover{background:#e3eaf7;color:var(--navy)}
.tabs{display:grid;gap:10px}
.tab-group{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.tab-group-label{
  display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;
  font-size:11px;font-weight:900;letter-spacing:.02em
}
.tab-group.birth .tab-group-label{background:#fff3cf;color:#9a6800}
.tab-group.org .tab-group-label{background:#eaf2ff;color:#2a4c83}
.tab-group.member .tab-group-label{background:#eef2f8;color:#4a5876}
.tab-btn{
  border:none;border-radius:999px;padding:10px 14px;background:#edf1f8;color:#45536f;cursor:pointer;
  font:inherit;font-size:13px;font-weight:800;transition:all .18s ease
}
.tab-btn:hover{background:#e3eaf7;color:var(--navy)}
.tab-btn.active{background:linear-gradient(180deg,var(--navy),var(--navy2));color:#fff;box-shadow:0 6px 18px rgba(32,56,100,.18)}
.tab-btn.birth{background:#fff9e8;color:#9a6800;border:1px solid #f2dfaa}
.tab-btn.birth:hover{background:#fff3cf;color:#7f5600}
.tab-btn.birth.active{background:linear-gradient(180deg,#d9a93a,#c58d13);color:#fff;border-color:transparent;box-shadow:0 6px 18px rgba(201,168,76,.28)}
.tab-btn.org{background:#edf4ff;color:#2a4c83;border:1px solid #c7dafc}
.tab-btn.org:hover{background:#e1ecff;color:#1f3c69}
.tab-btn.org.active{background:linear-gradient(180deg,#355d9b,#203864);color:#fff;border-color:transparent;box-shadow:0 6px 18px rgba(32,56,100,.22)}
.tab-btn.member{background:#f2f5fb;color:#5a6782;border:1px solid #dde4f0}
.tab-btn.member:hover{background:#e8eef8;color:#394964}
.tab-btn.member.active{background:linear-gradient(180deg,#4e6288,#2c3f61);color:#fff;border-color:transparent;box-shadow:0 6px 18px rgba(62,81,114,.22)}
.subbar{
  display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 18px 0;color:#586581
}
.subbar-title{font-size:21px;font-weight:900;color:var(--navy)}
.subbar-note{font-size:12px;line-height:1.5;text-align:right}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;padding:18px}
.card{
  background:#fff;border:1px solid #e4e8f1;border-radius:20px;padding:14px;box-shadow:0 8px 18px rgba(32,56,100,.06);
}
.card-top{display:grid;grid-template-columns:72px 1fr auto;gap:12px;align-items:start}
.photo{
  width:72px;height:88px;border-radius:12px;object-fit:cover;object-position:center top;
  border:1px solid #dbe2ee;background:#f4f6fb;display:block
}
.name{font-size:22px;font-weight:900;color:var(--navy);line-height:1.08}
.birth{font-size:12px;font-weight:800;color:#68778f;margin-top:4px}
.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{
  display:inline-flex;align-items:center;max-width:100%;padding:4px 8px;border-radius:999px;
  font-size:11px;font-weight:800;line-height:1.2
}
.chip.team{background:#f3f6fb;color:#5a6782}
.chip.company{background:#edf4ff;color:#27406c}
.chip.title{background:#faf5e8;color:#885f00}
.chip.role{background:linear-gradient(180deg,#2b4d86,#203864);color:#fff;box-shadow:0 4px 12px rgba(32,56,100,.14)}
.side{display:grid;justify-items:end;gap:6px}
.order{background:#f3f6fb;color:#55627d;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:800;white-space:nowrap}
.contact{display:grid;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid #edf1f6}
.phone-row,.mail-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.phone-row strong,.mail-row strong{font-size:11px;color:#7b879c;font-weight:800;flex-shrink:0}
.phone-row a,.mail-row a{color:#244b86;text-decoration:none;font-weight:800;font-size:14px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mail-row a{font-size:12.5px}
.empty{
  margin:18px;border:1px dashed #d8deea;border-radius:18px;background:#fbfcff;padding:24px;text-align:center;
  color:#73809a;font-size:14px;font-weight:700
}
.org-board-shell{grid-column:1/-1;background:#fff;border:1px solid #e4e8f1;border-radius:22px;padding:18px;box-shadow:0 8px 18px rgba(32,56,100,.06)}
.org-section{margin-bottom:18px}
.org-section:last-child{margin-bottom:0}
.org-title-chip{display:inline-flex;align-items:center;padding:6px 12px;border-radius:999px;background:#eef2f8;color:#304261;font-size:12px;font-weight:900;margin-bottom:10px}
.org-lead-wrap{display:grid;gap:16px}
.org-tier{position:relative;padding-top:8px}
.org-tier::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:2px;height:14px;background:#d6dce7}
.org-tier-president{display:flex;justify-content:center}
.org-tier-exec{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:start;position:relative;padding-top:20px}
.org-tier-exec::before{content:'';position:absolute;top:0;left:18%;right:18%;height:2px;background:#d6dce7}
.org-group-col{display:grid;gap:10px;align-content:start}
.org-group-title{text-align:center;font-size:12px;font-weight:900;color:#7f8aa0}
.org-node{background:linear-gradient(180deg,#fff,#f6f8fd);border:1px solid #d8e0ee;border-radius:18px;padding:12px 14px;box-shadow:0 8px 18px rgba(32,56,100,.06)}
.org-node.role-president{background:linear-gradient(180deg,#27406c,#203864);border-color:#27406c;color:#fff;min-width:250px}
.org-node.role-president .org-node-meta{color:rgba(255,255,255,.86)}
.org-node.role-vp{border-color:#9ec1ff;background:#eef5ff}
.org-node-head{font-size:11px;font-weight:900;color:#55627d;margin-bottom:6px}
.org-node.role-president .org-node-head{color:rgba(255,255,255,.82)}
.org-node-name{font-size:22px;font-weight:900;color:#1f2f4d;line-height:1.08}
.org-node.role-president .org-node-name{color:#fff}
.org-node-meta{font-size:11px;line-height:1.55;color:#64748b;margin-top:6px}
.org-node-mini .org-node-name{font-size:16px}
.org-tier-dept::before{height:16px}
.org-dept-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.org-dept-card{border:1px solid #e6d6aa;border-radius:18px;padding:14px;background:linear-gradient(180deg,#fffefb,#fffaf0)}
.org-dept-name{font-size:14px;font-weight:900;color:#304261;margin-bottom:10px}
.org-dept-people{display:grid;gap:8px}
.org-person-chip{background:#f7f9fd;border-left:4px solid #d4af37;border-radius:14px;padding:10px 12px}
.org-person-chip .label{font-size:11px;font-weight:900;color:#9a6a00;margin-bottom:4px}
.org-person-chip .name{font-size:14px;font-weight:900;color:#223556;line-height:1.15}
.org-person-chip .meta{font-size:11px;line-height:1.45;color:#66758f;margin-top:4px}
.birthday-card{border-color:#ecd9a6;background:linear-gradient(180deg,#fffdf7,#fff8eb)}
.birthday-date{display:inline-flex;align-items:center;gap:6px;background:#fff3cf;color:#9a6800;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:900}
.birthday-dday{background:linear-gradient(180deg,var(--gold2),var(--gold));color:#fff;border-radius:999px;padding:4px 8px;font-size:10px;font-weight:900}
.gate{
  position:fixed;inset:0;z-index:3000;background:rgba(8,18,40,.72);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;padding:20px
}
.gate-card{
  width:min(460px,100%);background:#fff;border-radius:26px;padding:28px 24px 24px;box-shadow:0 30px 90px rgba(0,0,0,.28)
}
.gate-card h2{font-size:28px;font-weight:900;color:var(--navy);margin-bottom:8px}
.gate-card p{font-size:14px;line-height:1.7;color:#5d6882}
.pin-row{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:18px}
.pin-row input{
  width:100%;border:1px solid #cfd8e7;border-radius:16px;padding:14px 16px;font:inherit;font-size:22px;
  font-weight:900;letter-spacing:.3em;text-align:center;background:#fbfcff
}
.pin-row button{
  border:none;border-radius:16px;padding:0 18px;background:linear-gradient(180deg,var(--navy),var(--navy2));
  color:#fff;font:inherit;font-size:14px;font-weight:900;cursor:pointer
}
.gate-help{margin-top:10px;font-size:12px;color:#8a94a8}
.gate-error{margin-top:10px;font-size:12px;font-weight:800;color:#b42318;display:none}
.gate-error.show{display:block}
@media(max-width:820px){
  .shell{padding:12px 12px 42px}
  .hero{padding:14px 14px 12px;border-radius:22px}
  .hero .eyebrow{display:none}
  .hero h1{font-size:22px;line-height:1.12;margin-bottom:2px}
  .hero-tools{margin-top:6px;gap:8px}
  .hero-stamp{font-size:11px}
  .hero-refresh{padding:8px 12px;font-size:11px}
  .content{border-radius:22px}
  .toolbar{padding:12px 12px 10px}
  .toolbar-search{margin-bottom:10px}
  .toolbar-search input{padding:10px 12px;font-size:12px}
  .toolbar-search button{padding:9px 11px;font-size:11px}
  .tabs{gap:8px}
  .tab-group{gap:6px}
  .tab-group-label{padding:5px 9px;font-size:10px}
  .tab-btn{padding:9px 11px;font-size:11.5px}
  .subbar{padding:10px 12px 0;display:block}
  .subbar-title{font-size:17px;line-height:1.2;word-break:keep-all}
  .subbar-note{font-size:11px;text-align:left;margin-top:4px}
  .grid{padding:12px;gap:9px}
  .org-board-shell{padding:12px;border-radius:18px}
  .org-title-chip{margin-bottom:8px;padding:5px 10px;font-size:11px}
  .org-lead-wrap{gap:10px}
  .org-tier{padding-top:6px}
  .org-tier::before{height:10px}
  .org-tier-exec{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;padding-top:10px}
  .org-tier-exec::before{left:25%;right:25%;height:2px}
  .org-tier-exec .org-group-col:last-child{grid-column:1/-1;max-width:220px;justify-self:center}
  .org-group-title{font-size:11px}
  .org-node{padding:10px 12px;border-radius:16px}
  .org-node.role-president{min-width:0;max-width:none}
  .org-node-name{font-size:15px}
  .org-node-mini .org-node-name{font-size:13px}
  .org-node-meta{font-size:10px}
  .org-dept-grid{grid-template-columns:1fr;gap:10px}
  .org-dept-card{padding:12px}
  .org-dept-name{font-size:13px;margin-bottom:8px}
  .org-person-chip{padding:9px 10px}
  .org-person-chip .name{font-size:13px}
  .org-person-chip .meta{font-size:10px}
  .card{padding:10px;border-radius:16px}
  .card-top{grid-template-columns:56px 1fr auto;gap:9px}
  .photo{width:56px;height:68px;border-radius:10px}
  .name{font-size:15px}
  .birth{font-size:11px}
  .meta{gap:4px;margin-top:5px}
  .chip{padding:3px 7px;font-size:10px}
  .order{font-size:10px;padding:3px 7px}
  .contact{gap:4px;margin-top:8px;padding-top:8px}
  .phone-row strong,.mail-row strong{display:none}
  .phone-row a{font-size:12px}
  .mail-row a{font-size:10.5px}
  .phone-row,.mail-row{display:flex;gap:8px}
  .gate-card{padding:24px 18px 18px}
  .gate-card h2{font-size:24px}
  .pin-row{grid-template-columns:1fr}
  .pin-row button{height:48px}
}
</style>
</head>
<body>
<div class="gate" id="pinGate">
  <div class="gate-card">
    <div class="eyebrow" style="color:#61708c">Private Access</div>
    <h2>원우회 내부 명단</h2>
    <p>이 페이지는 원우회 내부 확인용입니다. 4자리 PIN을 입력하면 17기·16기 명단과 간부·생일 정보를 볼 수 있습니다.</p>
    <div class="pin-row">
      <input id="pinInput" type="password" inputmode="numeric" maxlength="4" autocomplete="off" placeholder="4자리 PIN">
      <button id="pinButton" type="button">입장</button>
    </div>
    <div class="gate-help">브라우저를 닫기 전까지는 다시 묻지 않도록 설정됩니다.</div>
    <div class="gate-error" id="pinError">PIN 번호가 맞지 않습니다.</div>
  </div>
</div>

<main class="shell" id="appShell" hidden>
  <section class="hero">
    <div class="eyebrow">EMBA Internal Directory</div>
    <h1>EMBA 2026 학술보드<br>: 17기, 16기 원우회 명단</h1>
    <div class="hero-tools">
      <div class="hero-stamp" id="pageStamp">기준일 불러오는 중...</div>
      <button class="hero-refresh" id="refreshPageButton" type="button">새로고침</button>
    </div>
  </section>

  <section class="content">
    <div class="toolbar">
      <div class="toolbar-search">
        <input id="searchInput" type="search" placeholder="검색: 이름, 조, 연도, 기수, 위원회/직책">
        <button id="searchClearButton" type="button">지우기</button>
      </div>
      <div class="tabs" id="tabs"></div>
    </div>
    <div class="subbar">
      <div class="subbar-title" id="viewTitle">불러오는 중...</div>
      <div class="subbar-note" id="viewNote"></div>
    </div>
    <div class="grid" id="cardGrid"></div>
    <div class="empty" id="emptyState" hidden>표시할 데이터가 없습니다.</div>
  </section>
</main>

<script>
const PRIVATE_PIN = '2580';
const ACCESS_KEY = 'emba_private_access_v1';
const TAB_CONFIG = [
  { id:'twoweeks17', label:'2주내 생일', note:'17기만 표시 · 오늘부터 14일 이내 생일자', group:'birth' },
  { id:'month17', label:'이번달 생일', note:'17기만 표시 · 이번 달 생일자 전체', group:'birth' },
  { id:'officer17', label:'17기 원우회', note:'17기 원우회 조직도', group:'org' },
  { id:'officer16', label:'16기 원우회', note:'16기 원우회 조직도', group:'org' },
  { id:'all17', label:'17기 전체', note:'17기 전체 명단', group:'member' },
  { id:'all16', label:'16기 전체', note:'16기 전체 명단', group:'member' }

const ORG_CHART_SETS = {

      {role:'부회장',name:'김운용',birth:'80',company:'(주)인피니티',title:'CEO'}
    ],
    departments:[
      {dept:'사무국',people:[
        {label:'국장',name:'김태웅',birth:'80',company:'삼성전자',title:'수석 엔지니어'},

      {dept:'재무국',people:[
        {label:'국장',name:'김선도',birth:'82',company:'IBK기업은행',title:'팀장'},

      ]},
      {dept:'문화국',people:[

        {label:'부국장',name:'김제헌',birth:'86',company:'㈜코드캣',title:'대표'}
      ]},
      {dept:'홍보국',people:[
        {label:'국장',name:'정수인',birth:'77',company:'㈜런컬렉션',title:'이사'},
        {label:'부국장',name:'홍진성',birth:'79',company:'㈜SEISIN',title:'대표이사'},
        {label:'부국장',name:'하일산',birth:'84',company:'레이몰드㈜',title:'대표이사'}
      ]},
      {dept:'커뮤니케이션국',people:[
        {label:'국장',name:'박흥규',birth:'82',company:'삼성전자',title:'그룹장'},
        {label:'부국장',name:'정희선',birth:'87',company:'익스피디아 그룹',title:'부장'}
      ]},

let PRIVATE_DATA = null;
let ACTIVE_TAB = 'all17';
let ACTIVE_QUERY = '';

function normalizeDigits(value){
  return String(value || '').replace(/[^\d]/g,'');
}

function isOfficer(member){
  return !!String(member.role || '').trim();
}

function hasBirthday(member){
  return Number(member.month) >= 1 && Number(member.day) >= 1;
}

function nextBirthdayOffset(member, now){
  if(!hasBirthday(member)) return null;
  const month = Number(member.month);
  const day = Number(member.day);
  const thisYear = new Date(now.getFullYear(), month - 1, day);
  thisYear.setHours(0,0,0,0);
  const next = thisYear < now ? new Date(now.getFullYear() + 1, month - 1, day) : thisYear;
  next.setHours(0,0,0,0);
  return Math.round((next - now) / 86400000);
}

function birthdayLabel(member){
  if(!hasBirthday(member)) return '생일 정보 없음';
  return `${member.month}/${member.day}`;
}

function birthdayInline(member){
  return hasBirthday(member) ? ` · ${member.month}/${member.day}` : '';
}

function searchHaystack(member){
  return [
    member.name,
    member.team ? `${member.team}조` : '',
    member.birth ? `${member.birth}` : '',
    member.birth ? `${member.birth}년생` : '',
    member.month ? `${member.month}` : '',
    member.day ? `${member.day}` : '',
    hasBirthday(member) ? `${member.month}/${member.day}` : '',
    member.company,
    member.title,
    member.phone,
    member.email,
    member.role,
    member.cohort
  ].filter(Boolean).join(' ').toLowerCase();
}

function filterByQuery(list){
  const query = ACTIVE_QUERY.trim().toLowerCase();
  if(!query) return list;
  const tokens = query.split(/\s+/).filter(Boolean);
  return list.filter(member => {
    const haystack = searchHaystack(member);
    return tokens.every(token => haystack.includes(token));
  });
}

function formatRole(member){
  return member.role ? `<span class="chip role">${member.role}</span>` : '';
}

function formatPhone(member){
  if(!member.phone) return '';
  return `<a href="tel:${normalizeDigits(member.phone)}">${member.phone}</a>`;
}

function formatEmail(member){
  if(!member.email) return '';
  return `<a href="mailto:${member.email}">${member.email}</a>`;
}

function cardHTML(member, options = {}){
  const topRight = options.topRight || `<div class="order">No. ${member.order}</div>${formatRole(member)}`;
  const extraChip = options.extraChip || '';
  return `
    <article class="card ${options.birthday ? 'birthday-card' : ''}">
      <div class="card-top">
        <img class="photo" src="${member.photo}" alt="${member.name} 사진" loading="lazy">
        <div>
          <div class="name">${member.name}</div>
          <div class="birth">${member.birth ? member.birth + '년생' : '생년 미표기'}${options.birthInfo ? ` · ${options.birthInfo}` : birthdayInline(member)}</div>
          <div class="meta">
            ${extraChip}
            ${member.team ? `<span class="chip team">${member.team}조</span>` : ''}
            ${member.company ? `<span class="chip company">${member.company}</span>` : ''}
            ${member.title ? `<span class="chip title">${member.title}</span>` : ''}
          </div>
        </div>
        <div class="side">${topRight}</div>
      </div>
      <div class="contact">
        ${member.phone ? `<div class="phone-row"><strong>연락처</strong>${formatPhone(member)}</div>` : ''}
        ${member.email ? `<div class="mail-row"><strong>이메일</strong>${formatEmail(member)}</div>` : ''}
      </div>
    </article>
  `;
}

function renderOrgChartHTML(chart){

              <div class="org-group-title">부회장단</div>
              ${chart.vicePresidents.map(person=>personNode(person,'role-vp org-node-mini')).join('')}
            </div>
            <div class="org-group-col">
              <div class="org-group-title">감사</div>
              ${personNode(chart.auditor,'org-node-mini')}
            </div>
          </div>

      </section>

        <div class="org-title-chip">국별 구성</div>
        <div class="org-tier org-tier-dept">
          <div class="org-dept-grid">
            ${chart.departments.map(dept=>`
              <article class="org-dept-card">
                <div class="org-dept-name">${dept.dept}</div>
                <div class="org-dept-people">${dept.people.map(miniChip).join('')}</div>
              </article>
            `).join('')}
          </div>
        </div>

function getTabData(tabId){
  const today = new Date();
  today.setHours(0,0,0,0);
  const group17 = PRIVATE_DATA.sheet17;
  const group16 = PRIVATE_DATA.sheet16;
  switch(tabId){
    case 'twoweeks17':
      return group17
        .filter(hasBirthday)
        .map(member => ({ ...member, offset: nextBirthdayOffset(member, today) }))
        .filter(member => member.offset !== null && member.offset >= 0 && member.offset <= 14)
        .sort((a,b) => a.offset - b.offset);
    case 'month17':
      return group17
        .filter(member => hasBirthday(member) && Number(member.month) === (today.getMonth() + 1))
        .sort((a,b) => Number(a.day) - Number(b.day));
    case 'officer17':
      return group17.filter(isOfficer);
    case 'all17':
      return group17;
    case 'officer16':
      return group16.filter(isOfficer);
    case 'all16':
      return group16;
    default:
      return [];
  }
}

function renderTabs(){
  const tabs = document.getElementById('tabs');
  const groupLabels = {
    birth:'생일',
    org:'조직도',
    member:'원우회 전체'
  };
  const groupOrder = ['birth','org','member'];
  tabs.innerHTML = groupOrder.map(group => {
    const items = TAB_CONFIG.filter(tab => tab.group === group);
    return `
      <div class="tab-group ${group}">
        <span class="tab-group-label">${groupLabels[group]}</span>
        ${items.map(tab => `
          <button class="tab-btn ${group} ${tab.id === ACTIVE_TAB ? 'active' : ''}" data-tab="${tab.id}">${tab.label}</button>
        `).join('')}
      </div>
    `;
  }).join('');
  tabs.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      ACTIVE_TAB = btn.dataset.tab;
      renderTabs();
      renderView();
    });
  });
}

function renderView(){
  const config = TAB_CONFIG.find(tab => tab.id === ACTIVE_TAB);
  const isOrgTab = ACTIVE_TAB === 'officer17' || ACTIVE_TAB === 'officer16';
  const data = filterByQuery(getTabData(ACTIVE_TAB));
  document.getElementById('viewTitle').textContent = config.label;
  document.getElementById('viewNote').textContent = ACTIVE_QUERY
    ? `${config.note} · 검색 ${data.length}건`
    : config.note;
  const grid = document.getElementById('cardGrid');
  const empty = document.getElementById('emptyState');
  if(isOrgTab){
    grid.innerHTML = renderOrgChartHTML(ORG_CHART_SETS[ACTIVE_TAB]);
    empty.hidden = true;
    document.getElementById('viewNote').textContent = config.note;
    return;
  }
  if(!data.length){
    grid.innerHTML = '';
    empty.hidden = false;
    return;
  }
  empty.hidden = true;
  if(ACTIVE_TAB === 'twoweeks17' || ACTIVE_TAB === 'month17'){
    grid.innerHTML = data.map(member => {
      const offset = nextBirthdayOffset(member, new Date(new Date().setHours(0,0,0,0)));
      const badge = ACTIVE_TAB === 'twoweeks17'
        ? `<span class="birthday-dday">${offset === 0 ? 'TODAY' : `D-${offset}`}</span>`
        : `<span class="birthday-date">🎂 ${birthdayLabel(member)}</span>`;
      return cardHTML(member, {
        birthday: true,
        birthInfo: `${birthdayLabel(member)} 생일`,
        topRight: badge + formatRole(member)
      });
    }).join('');
    return;
  }
  grid.innerHTML = data.map(member => cardHTML(member)).join('');
}

function renderStamp(){
  const now = new Date();
  const stamp = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} 기준`;
  document.getElementById('pageStamp').textContent = stamp;
}

async function loadData(){
  const res = await fetch(`./private_members_data.json?v=${Date.now()}`, { cache:'no-store' });
  if(!res.ok) throw new Error('명단 데이터를 불러오지 못했습니다.');
  const raw = await res.json();
  PRIVATE_DATA = {
    sheet17: raw.sheet17.map(member => ({ ...member, cohort:'17기' })),
    sheet16: raw.sheet16.map(member => ({ ...member, cohort:'16기' }))
  };
}

async function bootPrivatePage(){
  await loadData();
  renderStamp();
  renderTabs();
  renderView();
}

function unlockPage(){
  sessionStorage.setItem(ACCESS_KEY, 'ok');
  document.getElementById('pinGate').hidden = true;
  document.getElementById('appShell').hidden = false;
  bootPrivatePage().catch(err => {
    document.getElementById('viewTitle').textContent = '데이터 로드 오류';
    document.getElementById('viewNote').textContent = err.message;
    document.getElementById('emptyState').hidden = false;
  });
}

function tryPin(){
  const input = document.getElementById('pinInput');
  const error = document.getElementById('pinError');
  if(input.value === PRIVATE_PIN){
    error.classList.remove('show');
    unlockPage();
    return;
  }
  error.classList.add('show');
  input.select();
}

document.getElementById('pinButton').addEventListener('click', tryPin);
document.getElementById('pinInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') tryPin();
});
document.getElementById('refreshPageButton').addEventListener('click', () => location.reload());
document.getElementById('searchInput').addEventListener('input', e => {
  ACTIVE_QUERY = e.target.value;
  if(PRIVATE_DATA) renderView();
});
document.getElementById('searchClearButton').addEventListener('click', () => {
  ACTIVE_QUERY = '';
  const input = document.getElementById('searchInput');
  input.value = '';
  if(PRIVATE_DATA) renderView();
  input.focus();
});

if(sessionStorage.getItem(ACCESS_KEY) === 'ok'){
  unlockPage();
}
